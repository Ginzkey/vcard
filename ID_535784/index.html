
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinica bupa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --primary: #e67e22; --bg: #f8f8f8; --card: #ffffff; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; }
        .card { background: var(--card); width: 100%; max-width: 500px; min-height: 100vh; box-shadow: 0 10px 60px rgba(0,0,0,0.1); text-align: center; }
        
        /* BANNER EMPRESARIAL */
        .banner { width: 100%; height: 300px; background: url('b.png') center/cover; background-color: #222; }
        
        .logo-box { width: 170px; height: 170px; border-radius: 25px; border: 6px solid var(--card); margin-top: -85px; object-fit: cover; background: #fff; position: relative; z-index: 5; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .header { padding: 35px 20px; }
        h1 { margin: 10px 0 5px; font-size: 30px; text-transform: uppercase; color: #111; letter-spacing: 1px; }
        .subtitle { color: var(--primary); font-weight: bold; font-size: 17px; text-transform: uppercase; margin-bottom: 25px; letter-spacing: 2px; }
        
        .contact-grid { display: flex; justify-content: center; gap: 20px; margin: 25px 0; }
        .icon-circle { width: 65px; height: 65px; border-radius: 50%; background: #222; color: white; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 28px; transition: 0.3s; }
        .icon-circle:hover { background: var(--primary); transform: translateY(-5px); }
        
        .map-box { margin: 30px; border-radius: 20px; overflow: hidden; border: 1px solid #eee; height: 320px; background: #eee; position: relative; }
        iframe { width: 100%; height: 100%; border: 0; }
        
        .btn-main { display: block; width: 85%; margin: 15px auto; padding: 20px; background: #222; color: white; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-main:hover { background: var(--primary); }
        
        .footer { font-size: 12px; color: #bbb; margin: 60px 0 30px; padding-top: 20px; border-top: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="card">
        <div class="banner"></div>
        <img src="p.png" class="logo-box">
        <div class="header">
            <h1>Clinica bupa</h1>
            <div class="subtitle">atencion de enfermitos</div>
            <p style="font-size:15px; color:#666;"><i class="fas fa-map-marker-alt" style="color:var(--primary)"></i> Av. Departamental 1455, 8240004 La Florida, Región Metropolitana</p>
        </div>

        <div class="contact-grid">
            <a href="tel:99999999999" class="icon-circle"><i class="fas fa-phone"></i></a>
            <a href="https://wa.me/99999999999" class="icon-circle" style="background:#25D366"><i class="fab fa-whatsapp"></i></a>
            <a href="mailto:bupamail@bupa.cl" class="icon-circle"><i class="fas fa-envelope"></i></a>
            <a href="https://maps.app.goo.gl/2wYdpTtt72Tk2iW78" target="_blank" class="icon-circle" style="background:#4285F4"><i class="fas fa-location-dot"></i></a>
        </div>

        
        <div class="map-box">
            <iframe 
                src="https://maps.app.goo.gl/...Av.+Departamental+1455,+8240004+La+Florida,+Región+Metropolitana&output=embed" 
                allowfullscreen="" loading="lazy">
            </iframe>
        </div>
        <a href="https://maps.app.goo.gl/2wYdpTtt72Tk2iW78" target="_blank" style="color:var(--primary); font-size:14px; font-weight:bold; text-decoration:none; display:inline-block; margin-bottom:20px;">
            <i class="fas fa-directions"></i> VER EN GOOGLE MAPS / WAZE
        </a>
        

        <a href="qr_off.png" class="btn-main" download><i class="fas fa-qrcode"></i> MI CÓDIGO QR</a>

        <div class="footer">
            <p>Powered by <b style="color:var(--primary)">Albaricoque Connect IT 🐾</b></p>
        </div>
    </div>
</body>
</html>
