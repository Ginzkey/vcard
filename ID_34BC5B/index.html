    <style>
        :root { --primary: #e67e22; --bg: #f5f5f5; --card: #ffffff; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; }
        .card { background: var(--card); width: 100%; max-width: 500px; min-height: 100vh; box-shadow: 0 10px 50px rgba(0,0,0,0.1); text-align: center; }
        .banner { width: 100%; height: 300px; background: url('b.png') center/cover; background-color: #222; }

        .contact-grid { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin: 20px 0; padding: 0 20px; }
        .icon-circle { width: 55px; height: 55px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 24px; transition: 0.3s; }
        .icon-circle:hover { transform: translateY(-5px); filter: brightness(1.2); }
        
        .map-box { margin: 25px; border-radius: 20px; overflow: hidden; height: 300px; border: 1px solid #ddd; }
        iframe { width: 100%; height: 100%; border: 0; }
        
        .btn-main { display: block; width: 85%; margin: 20px auto; padding: 22px; background: #222; color: white; text-decoration: none; border-radius: 15px; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-main:hover { background: var(--primary); }
        
        .footer { font-size: 12px; color: #aaa; margin: 50px 0 30px; padding-top: 25px; border-top: 1px solid #eee; }
        .footer a { color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
