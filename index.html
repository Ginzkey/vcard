
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test - Perfil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --primary: #e67e22; --bg: #0f0f0f; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .wrapper { width: 100%; max-width: 450px; background: #1a1a1a; min-height: 100vh; position: relative; overflow: hidden; }
        .banner { width: 100%; height: 220px; background-image: url('banner.png'); background-size: cover; background-position: center; position: relative; }
        .banner::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 100px; background: linear-gradient(transparent, #1a1a1a); }
        .profile-img { width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--primary); position: absolute; top: 150px; left: 50%; transform: translateX(-50%); object-fit: cover; z-index: 10; background: #222; }
        .content { margin-top: 80px; padding: 20px; text-align: center; }
        h1 { font-size: 26px; margin-bottom: 5px; }
        .company { font-size: 16px; color: #ccc; font-weight: 500; margin-bottom: 5px; }
        .title { color: var(--primary); font-size: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; }
        .btn { display: flex; align-items: center; justify-content: center; padding: 18px; border-radius: 15px; text-decoration: none; font-weight: bold; margin-bottom: 12px; transition: 0.3s; color: white; background: #2c3e50; border: 1px solid rgba(255,255,255,0.1); }
        .save-btn { background: var(--primary); border: none; font-size: 16px; margin-top: 10px; }
        .social-row { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .social-icon { color: white; font-size: 28px; opacity: 0.8; }
        .social-icon:hover { color: var(--primary); opacity: 1; }
        .feedback-box { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 20px; margin-top: 30px; border: 1px solid rgba(255,255,255,0.05); }
        input { width: 90%; padding: 14px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; }
        .send-wa { background: #25D366; width: 100%; border: none; padding: 15px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="banner"></div>
        <img src="profile.png" class="profile-img">
        <div class="content">
            <h1>test pino</h1>
            <div class="company">Clinica Bupa stgo</div>
            <div class="title">Enfermero ingeniero</div>
            
            <div class="social-row"><a href="https://www.linkedin.com/in/luis-pino-vergara-57a529b8/" class="social-icon" target="_blank"><i class="fab fa-linkedin"></i></a><a href="https://www.instagram.com/ginzkey_whiskey" class="social-icon" target="_blank"><i class="fab fa-instagram"></i></a></div>

            <a href="contacto.vcf" class="btn save-btn"><i class="fas fa-user-plus" style="margin-right:12px"></i> GUARDAR CONTACTO</a>
            
            <div class="feedback-box">
                <p style="margin-top:0; font-weight:bold; color:var(--primary)">¿Intercambiamos datos? 🐾</p>
                <input type="text" id="v_name" placeholder="Tu Nombre">
                <input type="text" id="v_info" placeholder="Tu Teléfono o Email">
                <button class="send-wa" onclick="sendWA()"><i class="fab fa-whatsapp"></i> ENVIAR MIS DATOS</button>
            </div>
            <p style="font-size:10px; opacity:0.2; margin-top:40px;">ALBARICOQUE IT SYSTEM</p>
        </div>
    </div>
    <script>
        function sendWA() {
            const n = document.getElementById('v_name').value;
            const i = document.getElementById('v_info').value;
            if(!n || !i) { alert('Por favor rellena ambos campos'); return; }
            const text = encodeURIComponent('Hola test, soy ' + n + '. Mi contacto es: ' + i);
            window.location.href = 'https://wa.me/+56973848871?text=' + text;
        }
    </script>
</body>
</html>
