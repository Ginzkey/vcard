<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luis Enrique | Conectividad & Redes</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <style>
        :root {
            --primary: #e67e22; /* El naranja característico de Luis & Gatitos s.a. */
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: #0f0f0f;
            background-image: radial-gradient(circle at 20% 30%, #2c3e50 0%, #0f0f0f 100%);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--primary);
            margin-bottom: 20px;
            object-fit: cover;
            background: #222;
        }

        h1 { margin: 10px 0 5px; font-size: 24px; letter-spacing: 1px; }
        .tagline { color: var(--primary); font-size: 14px; font-weight: bold; text-transform: uppercase; margin-bottom: 30px; }

        .links-container { display: flex; flex-direction: column; gap: 12px; }

        .btn {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: 0.3s ease;
            font-weight: 500;
        }

        .btn:hover {
            background: var(--primary);
            transform: translateY(-3px);
            color: white;
            box-shadow: 0 5px 15px rgba(230, 126, 34, 0.3);
        }

        .btn i { width: 25px; font-size: 18px; margin-right: 15px; text-align: center; }

        /* Formulario de Captura (Add Me) */
        .add-me-section {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid var(--border);
            text-align: left;
        }

        .add-me-section h3 { font-size: 18px; color: var(--primary); margin-bottom: 15px; text-align: center; }

        .input-group { margin-bottom: 10px; }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 14px;
            box-sizing: border-box;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 5px;
        }

        .submit-btn:hover { filter: brightness(1.1); transform: scale(1.02); }

        .footer { margin-top: 30px; font-size: 11px; opacity: 0.5; line-height: 1.5; }
    </style>
</head>
<body>

<div class="card animate__animated animate__fadeInUp">
    <img src="logo-gato.png" alt="Luis & Gatitos s.a." class="profile-img">
    
    <h1>Luis Enrique</h1>
    <div class="tagline">Ingeniería en Conectividad y Redes</div>

    <div class="links-container">
        <a href="https://wa.me/569XXXXXXXX" class="btn">
            <i class="fa-brands fa-whatsapp"></i> WhatsApp Profesional
        </a>
        
        <a href="mailto:luis@ejemplo.cl" class="btn">
            <i class="fa-solid fa-envelope">
