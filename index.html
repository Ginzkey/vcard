
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Alicia | Enfermera</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #e67e22; --bg: #0f0f0f; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, sans-serif; display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .card { width: 100%; max-width: 400px; background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border-radius: 24px; padding: 30px; text-align: center; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .profile-img { width: 130px; height: 130px; border-radius: 50%; border: 4px solid var(--primary); margin-top: -80px; object-fit: cover; background: #222; }
        h1 { margin: 15px 0 5px; font-size: 26px; }
        .tagline { color: var(--primary); font-size: 14px; font-weight: bold; text-transform: uppercase; margin-bottom: 25px; }
        .btn { display: flex; align-items: center; padding: 14px 20px; background: rgba(255,255,255,0.05); color: white; text-decoration: none; border-radius: 14px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .btn:hover { background: var(--primary); transform: translateY(-3px); }
        .btn i { width: 30px; font-size: 18px; }
        .save-btn { background: var(--primary); justify-content: center; font-weight: bold; margin-top: 10px; }
        .footer { margin-top: 30px; font-size: 12px; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="card">
        <img src="profile.png" class="profile-img">

        <div class="tagline">Enfermera</div>

            <a href="mailto:alicia.diaz@bupa.cl" class="btn"><i class="fas fa-envelope"></i> Email Laboral</a>
            
            
            
            <a href="contacto.vcf" class="btn save-btn"><i class="fas fa-user-plus"></i> GUARDAR CONTACTO</a>
        </div>

        <div class="footer">Albaricoque IT 🐾</div>
    </div>
</body>
</html>
